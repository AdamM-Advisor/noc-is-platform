name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      NOCIS_DATA_DIR: .test_tmp/data
      NOCIS_DB_PATH: .test_tmp/data/noc_analytics.duckdb
      NOCIS_UPLOAD_DIR: .test_tmp/uploads
      NOCIS_BACKUP_DIR: .test_tmp/data/backups
      NOCIS_CHUNK_DIR: .test_tmp/chunks
      NOCIS_EXPORT_DIR: .test_tmp/exports
      NOCIS_LAKE_ROOT: .test_tmp/parquet_lake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall -q backend main.py
      - name: Run backend unit tests
        run: python -m unittest discover -s backend/tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
